name: dfine
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      - torch>=2.0
      - torchvision
      - pycocotools
      - pyyaml
      - opencv-python
      - albumentations
      - wandb
      - tensorboard
      - scipy
      - numpy
      # install D-FINE itself from the cloned repo:
      # pip install -e /path/to/D-FINE (after `git clone https://github.com/Peterande/D-FINE`)
