# D-FINE Phase 2 baseline config — HGNetV2-S backbone, matching DEIMv2's
# choice for RQ1 comparability (D-FINE only offers HGNetV2 anyway).
#
# Based on dfine_hgnetv2_s_coco.yml (the paper's actual reported
# hyperparameters), NOT dfine_hgnetv2_s_custom.yml (an unvalidated
# "finetune on your own data" preset with different epochs/batch/lr) —
# see PLAN.md Decision Log, 2026-07-07. Only the dataset section is
# overridden, per Phase 2's "no tuning yet" rule.
#
# Run from repo root (use src/training/train_dfine.py, NOT third_party's
# train.py directly, so gradient accumulation actually takes effect):
#   torchrun --nproc_per_node=1 src/training/train_dfine.py -c configs/model/dfine/dfine_pidray.yml
__include__: [
  '../../../third_party/D-FINE/configs/dfine/dfine_hgnetv2_s_coco.yml',
  './pidray_dataset.yml',
]

output_dir: ./outputs/dfine_hgnetv2_s_pidray

# Server has 1x RTX 3090 (24GB); a true batch of 32 OOMs at this config's
# training resolution. src/training/train_dfine.py accumulates gradients
# across chunks of this size so the effective batch size stays 32,
# matching the paper (see PLAN.md Decision Log, 2026-07-07).
accum_micro_batch: 4
