dataset_name: pidray
num_classes: 12
categories:
  - gun
  - knife
  - wrench
  - pliers
  - scissors
  - hammer
  - handcuffs
  - baton
  - sprayer
  - powerbank
  - lighter
  - bullet

paths:
  raw_dir: data/raw/pidray
  processed_images: data/processed/images
  # materialized per-split COCO JSON (src/data/materialize_split.py) — every
  # model's dataloader points ann_file at these two, never at xray_train.json
  # directly, so all 3 models train/val on the identical id sets.
  train_json: data/processed/pidray_train.json
  val_json: data/processed/pidray_val.json
  # official test — untouched, read straight from raw_dir, never materialized
  test_easy_json: data/raw/pidray/annotations/xray_test_easy.json
  test_hard_json: data/raw/pidray/annotations/xray_test_hard.json
  test_hidden_json: data/raw/pidray/annotations/xray_test_hidden.json
  split_dir: data/splits

split:
  # Official PIDray test (easy/hard/hidden) is untouchable — never re-split.
  # Only the official train set is split here.
  train: 0.85
  val: 0.15
  seed: 42
  strategy: multilabel_stratified   # image-level, not vehicle-level

preprocessing:
  clahe:
    mode: on_the_fly   # decided 2026-07-07 — see PLAN.md Decision Log
    clip_limit: 2.0
    tile_grid_size: 8
  augmentation:
    library: albumentations   # src/data/augmentation.py is the single source of truth
    color_jitter: false   # excluded — inappropriate for X-ray domain
    horizontal_flip: true
    random_crop: true
